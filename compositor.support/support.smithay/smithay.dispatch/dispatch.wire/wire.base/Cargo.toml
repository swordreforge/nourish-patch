compositor_support_smithay_state_dnd_factory.workspace = true
compositor_support_smithay_state_singlepixel_factory.workspace = true

[lib]
path = "lib.rs"

[package.metadata.lint]
allow = ["size"]
reason = "31 orphan-rule-bound smithay handler/Dispatch impls must live in the crate defining Wire<S>; helper code already extracted to wire.color/wire.colorsurf/wire.redraw (floor ~397 LOC)"
