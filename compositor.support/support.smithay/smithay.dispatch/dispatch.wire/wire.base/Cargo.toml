# Relocated factory (document/SMITHAY_DECOUPLING.md P2): `new_dispatch()` builds
# the concrete `Dispatch` here, where `Dispatch: GlobalDispatch<…>` holds via
# `delegate_dispatch2!(Dispatch)`. Needs every per-protocol factory directly.
compositor_support_smithay_state_xdg_activation_factory.workspace = true
compositor_support_smithay_state_dmabuf_factory.workspace = true
compositor_support_smithay_state_clipboard_factory.workspace = true
compositor_support_smithay_state_seat_factory.workspace = true
