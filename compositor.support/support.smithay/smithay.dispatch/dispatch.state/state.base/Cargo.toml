# `delegate_dispatch2!(Dispatch)` + the color-management wayland_server::Dispatch
# orphan impls must live in the crate that DEFINES `Dispatch` (orphan rule —
# document/SMITHAY_DECOUPLING.md P2 flip).
compositor_support_smithay_dispatch_wire_color.workspace = true
compositor_support_smithay_dispatch_wire_colorsurf.workspace = true
# Handler-impl bodies (orphan-required here) use these leaf helpers (no
# `*.dispatch` crate, which would cycle — document/SMITHAY_DECOUPLING.md P2).
compositor_support_smithay_dispatch_wire_redraw.workspace = true
compositor_support_smithay_state_xdg_activation_request.workspace = true
compositor_support_smithay_wayland_connection_record.workspace = true
compositor_developer_debug_instance_record = { workspace = true }
[lib]
path = "lib.rs"

[package.metadata.lint]
allow = ["size"]
reason = "Dispatch is the concrete wayland protocol-state aggregate plus its required SeatHandler impl (document/SMITHAY_DECOUPLING.md P2 flip); intentionally large."