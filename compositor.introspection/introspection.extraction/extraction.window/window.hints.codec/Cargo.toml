[package]
name = "compositor_introspection_extraction_window_hints_codec"
version = "0.0.1"
edition = "2024"

[dependencies]
compositor_introspection_extraction_window_hints_attribute = { workspace = true }
compositor_introspection_extraction_window_hints_id = { workspace = true }
compositor_introspection_extraction_window_hints_source = { workspace = true }
serde.workspace = true
serde_json.workspace = true

[package.metadata.lint]
allow = ["size"]
reason = "The type-erased codec registry (register/encode/decode/make_hint_item/type lookups) is one cohesive unit; splitting the fn-pointer table across crates would obscure it."

[lib]
path = "lib.rs"
