[package]
name = "compositor-developer-tool"
version = "0.1.0"
edition = "2021"
description = "y5 developer log viewer (Tauri + React)"

# Standalone: this is its own workspace root so it never joins a compositor workspace.
[workspace]

[build-dependencies]
tauri-build = { version = "2", features = [] }
tonic-prost-build = "0.14"

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tonic = "0.14"
tonic-prost = "0.14"
prost = "0.14"
tokio = { version = "1", features = ["rt-multi-thread", "net", "macros", "time"] }
tokio-stream = { version = "0.1", features = ["net"] }
tower = { version = "0.5", features = ["util"] }
hyper-util = "0.1"

[profile.dev]
incremental = true
