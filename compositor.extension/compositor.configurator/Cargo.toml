# compositor.configurator — add-only EXTENSION root (not expansion): the in-
# compositor settings/configurator UI. Movable, not an integral part of the
# compositor. Cross-workspace deps injected into the GENERATED block by
# `workspace.link.js` (`./link.all.sh`); only external deps declared by hand.

[workspace]
resolver = "3"
members = [
    "configurator.*/*/*",
]

# pam-sys patched to ship prebuilt bindings (upstream bindgen 0.69 fails under
# clang 22: "libclang not loaded on this thread"). Mirror every other pam-sys-
# consuming workspace so smithay's session backend resolves the vendored crate.
[patch.crates-io]
pam-sys = { path = "../../vendor/pam-sys" }

[workspace.dependencies]
zbus = { version = "5.15.0", default-features = false, features = ["tokio", "blocking-api"] }
smithay = { path = "../../vendor/smithay", version = "0.7.0", default-features = false, features = [
    "backend_winit",
    "gbm",
    "backend_gbm",
    "drm",
    "backend_drm",
    "wayland_frontend",
    "desktop",
    "backend_egl",
    "use_system_lib",
    "wayland-egl",
    "backend_libinput",
    "backend_udev",
    "backend_vulkan",
    "backend_session_libseat",
    "renderer_gl",
    "renderer_pixman",
    "renderer_multi",
] }
iced_core = { path = "../../vendor/iced/core", version = "0.15.0-dev" }
iced_widget = { path = "../../vendor/iced/widget", version = "0.15.0-dev", features = [
    "advanced",
    "wgpu",
    "image",
    "svg",
] }

