[package]
name = "compositor_background_two_draw_vulkan"
version = "0.0.1"
edition = "2024"

[dependencies]
compositor_orchestration_draw_dispatch_frame = { workspace = true }
compositor_developer_stats_registry_base = { workspace = true }

# The parallax WGSL shaders are naga-compiled to SPIR-V at build time (like the
# kernel's HDR composite); the kernel embeds nothing parallax-specific.
[build-dependencies]
naga = { workspace = true }

[lib]
path = "lib.rs"
