[package]
name = "compositor_background_two_system_base"
version = "0.0.1"
edition = "2024"

[dependencies]
compositor_background_three_system_base = { workspace = true }
compositor_orchestration_draw_platform_base = { workspace = true }
compositor_orchestration_smithay_data_base = { workspace = true }
compositor_y5_camera_system_base = { workspace = true }
compositor_support_system_buffer_token_base = { workspace = true }
compositor_support_system_world_frame_base = { workspace = true }
compositor_support_system_storage_token_base = { workspace = true }
compositor_support_system_trait_system_base = { workspace = true }
compositor_background_two_state_base = { workspace = true }
compositor_background_two_draw_element = { workspace = true }
compositor_developer_stats_registry_base = { workspace = true }
compositor_support_system_persist_trait_base = { workspace = true }
compositor_support_system_persist_entry_base = { workspace = true }
serde = { workspace = true }
bitflags = { workspace = true }
smithay = { workspace = true }
# Developer logging — provides error!/warn!/info!/trace!/abort! (see lib.rs).
compositor_developer_debug_instance_record = { workspace = true }

[lib]
path = "lib.rs"

[package.metadata.lint]
allow = ["size"]
reason = "Owns the per-world BG_TWO slot and its persistence as one unit: the system's update/draw/buffer plus the BackgroundDoc that projects/rehydrates this world's background_shader override into that same slot — the tokens live here, so the Document can't move out without a tokens-in-state refactor."
