[package]
name = "compositor_y5_surface_system_base"
version = "0.0.1"
edition = "2024"

[dependencies]
compositor_support_system_storage_token_base = { workspace = true }
compositor_support_system_buffer_token_base = { workspace = true }
compositor_support_system_channel_token_base = { workspace = true }
compositor_support_system_channel_router_base = { workspace = true }
compositor_support_system_trait_system_base = { workspace = true }
compositor_support_system_storage_slot_base = { workspace = true }
compositor_support_iced_core_engine_base = { workspace = true }
compositor_developer_debug_instance_record = { workspace = true }
compositor_y5_surface_state_base = { workspace = true }
compositor_monitor_runtime_surface_base = { workspace = true }
compositor_monitor_compositor_iced_base = { workspace = true }
smithay = { workspace = true }

[package.metadata.lint]
allow = ["size"]
reason = "Owns the surface slot + the registry-routing channels (ICED_BUTTON, ICED_FOCUS, ICED_CONTEXT): each is an indivisible announce-fn + channel + buffer-apply triple that input systems use to reach the registry (the only mutation path); they belong on the one slot owner and can't be split without scattering the registry's single write authority."

[lib]
path = "lib.rs"
