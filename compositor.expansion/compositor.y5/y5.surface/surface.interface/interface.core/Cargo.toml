[package]
name = "compositor_y5_surface_interface_core"
version = "0.0.1"
edition = "2024"

# Loop-free hit-test core, split out of interface.base so Pass-1 input SYSTEMS
# can hit-test (`surface_under_filtered_cx`) without the dependency cycle that
# interface.base has via `orchestration_core` (its focus accessors depend back on
# the system crates). NO `orchestration_core_state_base` dependency here.

[dependencies]
compositor_y5_window_interface_record = { workspace = true }
uuid = { workspace = true }
compositor_y5_camera_state_base = { workspace = true }
compositor_y5_surface_system_base = { workspace = true }
compositor_developer_debug_instance_record = { workspace = true }
smithay = { workspace = true }
compositor_monitor_compositor_iced_base.workspace = true
compositor_support_smithay_state_layershell_dispatch.workspace = true
compositor_y5_camera_transform_translate.workspace = true
compositor_developer_environment_config_base.workspace = true
compositor_orchestration_draw_layer_base.workspace = true
compositor_support_system_storage_slot_base.workspace = true
compositor_support_smithay_state_space_base.workspace = true
compositor_support_world_host_space_base.workspace = true
compositor_support_world_order_track_base.workspace = true
compositor_y5_select_state_base.workspace = true
compositor_y5_surface_state_base.workspace = true

[lib]
path = "lib.rs"
