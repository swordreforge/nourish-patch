[package]
name = "compositor_y5_camera_system_base"
version = "0.0.1"
edition = "2024"

[dependencies]
compositor_y5_navigator_state_base = { workspace = true }
compositor_support_system_world_frame_base = { workspace = true }
compositor_support_system_channel_token_base = { workspace = true }
compositor_support_system_buffer_token_base = { workspace = true }
compositor_support_system_storage_token_base = { workspace = true }
compositor_support_system_trait_system_base = { workspace = true }
compositor_support_system_input_event_base = { workspace = true }
compositor_support_system_input_layer_base = { workspace = true }
compositor_support_system_storage_slot_base = { workspace = true }
compositor_y5_camera_state_base = { workspace = true }
compositor_y5_canvas_system_base = { workspace = true }
compositor_y5_canvas_input_state = { workspace = true }
compositor_y5_group_state_base = { workspace = true }
compositor_y5_surface_interface_core = { workspace = true }
compositor_y5_window_interface_record = { workspace = true }
compositor_orchestration_draw_layer_base = { workspace = true }
smithay = { workspace = true }

[package.metadata.lint]
allow = ["size"]
reason = "Pass-1 input is whole-handler (Consume is all-or-nothing): CameraSystem::input bundles the over-window hit-test, grab check, and cursor-anchored zoom as one unit; zoom must run on the camera OWNER (synchronous accumulation), so it lives here."

[lib]
path = "lib.rs"
