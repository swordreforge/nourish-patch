[package]
name = "compositor_y5_graphic_capture_registry"
version = "0.1.0"
edition = "2024"

# Purely mechanical capture engine. Knows nothing about Bevy, Wayland, or
# scene semantics. Owns dmabufs, performs blits according to per-capture
# policies, deduplicates structurally-identical requests.
#
# Call sites own CaptureHandles. The registry tracks them via Weak refs and
# cleans up underlying captures when the last handle is dropped.

[dependencies]
compositor_developer_debug_instance_record = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
wgpu = { workspace = true }


smithay = { workspace = true }
compositor_support_bevy_core_runtime_base.workspace = true

[lib]
path = "lib.rs"
