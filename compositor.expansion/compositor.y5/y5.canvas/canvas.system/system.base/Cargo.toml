[package.metadata.lint]
allow = ["size"]
reason = "Pass-1 input is whole-handler (Consume is all-or-nothing): CanvasSystem::input bundles the release handler's grab transition + synchronous seat button + iced/resize fan-out as one indivisible unit; splitting it across modules would break the single Consume decision."

[lib]
path = "lib.rs"
