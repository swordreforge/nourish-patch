[package]
name = "compositor_y5_picker_three_build"
version = "0.0.1"
edition = "2024"
# `build.rs` here is this crate's MODULE file, not a Cargo build script — disable
# build-script auto-detection so Cargo treats it as ordinary library source.
build = false

[dependencies]
compositor_developer_debug_instance_record = { workspace = true }
compositor_support_bevy_core_bridge_base = { workspace = true }
compositor_support_bevy_core_placeholder_base = { workspace = true }
compositor_y5_picker_three_state = { workspace = true }
compositor_y5_picker_three_spawn = { workspace = true }
compositor_y5_picker_three_apply = { workspace = true }
bevy = { workspace = true }
wgpu = { workspace = true }

[lib]
path = "lib.rs"
