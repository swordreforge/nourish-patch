[package]
name = "compositor_y5_placeholder_system_base"
version = "0.0.1"
edition = "2024"

[dependencies]
compositor_support_system_storage_token_base = { workspace = true }
compositor_support_system_buffer_token_base = { workspace = true }
compositor_support_system_channel_token_base = { workspace = true }
compositor_support_system_channel_router_base = { workspace = true }
compositor_support_system_trait_system_base = { workspace = true }
compositor_y5_placeholder_state_base = { workspace = true }
compositor_y5_surface_system_base = { workspace = true }
compositor_y5_placeholder_persist_doc = { workspace = true }
compositor_support_system_persist_document_entry = { workspace = true }
smithay = { workspace = true }
uuid = { workspace = true }

[package.metadata.lint]
allow = ["size"]
reason = "Owns the placeholder slot and the cross-system geometry channel: an interactive placeholder move/scale must update both this slot (modify_visible) and the iced registry (surface system), so the channel receiver + buffer + the two announce paths live together as one routing unit."

[lib]
path = "lib.rs"
