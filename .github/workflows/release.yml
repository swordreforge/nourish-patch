name: Release

# CD on a version tag: build the full install bundle (installer + compositor/dev/polkit/
# mx/xwayland binaries + components) and attach it to a GitHub Release for manual download.
# This is the same package.tar.gz the Publish workflow serves at nourish.snowies.com — here
# it is pinned to the tag so any release is reproducible/fetchable by hand.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  artifacts:
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository_owner }}/y5-ci:fedora44
    steps:
      - uses: actions/checkout@v4
      - name: Build install bundle (installer + binaries + components)
        run: ci/scripts/package-installer.sh
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/package.tar.gz dist/SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.ref_name }}
          path: dist/
