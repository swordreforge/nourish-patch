name: CI

on:
  push:
    branches: [upstream-integration, upstream]
  pull_request:

permissions:
  contents: read

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/y5-ci:fedora44
  # Keep the sccache + cargo dirs inside the workspace so actions/cache can persist them.
  SCCACHE_DIR: ${{ github.workspace }}/.sccache
  CARGO_HOME: ${{ github.workspace }}/.cargo-home
  # CI doesn't need debug symbols — drop them entirely. This cuts target/ size the most,
  # keeping the big workspaces (bevy/wgpu/ffmpeg) well under the runner's ~14 GB. Safe:
  # coverage reads the instrumentation coverage map (not DWARF), and test pass/fail is
  # unchanged — only a *failing* test's backtrace loses source line numbers (function
  # names still show). Set to line-tables-only if you ever need those lines back.
  CARGO_PROFILE_DEV_DEBUG: "0"

jobs:
  # Validate the y5_compositor udev_release build path once (the loader entry).
  # This is the single root build — the actual product — replacing the former
  # per-workspace clippy/build/test/coverage matrix.
  build-udev:
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository_owner }}/y5-ci:fedora44
    steps:
      - uses: actions/checkout@v4
      - run: environment/build.sh udev release

  # Candidate release artifact: on a branch push (not PRs), build the full install bundle
  # the Publish/Release jobs would ship — installer + binaries + every component — and keep
  # it as a downloadable artifact. Lets `upstream-integration` be validated as a release
  # candidate before it is merged into `upstream` (which actually publishes it).
  installer-bundle:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository_owner }}/y5-ci:fedora44
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ${{ env.SCCACHE_DIR }}
            ${{ env.CARGO_HOME }}/registry
          # Keyed on the commit (no filesystem hash — hashFiles('**/Cargo.lock') fails the
          # whole-tree walk in a container job). Each commit saves a fresh cache; restore-keys
          # restores the most recent one so sccache + the registry stay warm across runs.
          key: ${{ runner.os }}-installer-bundle-${{ github.sha }}
          restore-keys: ${{ runner.os }}-installer-bundle-
      - name: Build install bundle (installer + binaries + components)
        run: ci/scripts/package-installer.sh
      - uses: actions/upload-artifact@v4
        with:
          name: install-bundle-${{ github.ref_name }}
          path: |
            dist/package.tar.gz
            dist/SHA256SUMS

  # Re-run workspace.link.js everywhere; fail if a committed GENERATED block is stale.
  link-drift:
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository_owner }}/y5-ci:fedora44
    steps:
      - uses: actions/checkout@v4
      - run: ci/scripts/link-drift.sh
