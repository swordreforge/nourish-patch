name: Publish

# Publish everything on merge to `upstream` — the single deployment source of truth. The
# install bundle is built ONCE (the `bundle` job) and fed to both channels so they can never
# drift:
#   Pages (nourish.snowies.com):
#     /                         the marketing site (compositor.website, carries the CNAME)
#     /docs                     coverage report + reference guides
#     /release/latest/fedora44  the install bundle (package.tar.gz + SHA256SUMS) get.sh fetches
#   GitHub Release:
#     the rolling `latest` release — the same package.tar.gz + SHA256SUMS attached as assets.
#
# `upstream-integration` is the candidate branch (CI builds + validates via ci.yml); merging
# it into `upstream` is the single release action — one build feeds both Pages and the Release.
on:
  push:
    branches: [upstream]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read   # the site job reads the coverage artifact from the upstream-integration CI run

concurrency:
  group: pages
  cancel-in-progress: true

env:
  # Mirror ci.yml: keep sccache + cargo dirs in the workspace so actions/cache persists them
  # across runs, and drop debug symbols from the doc/coverage builds. Without these the site
  # job recompiled the whole tree cold, with full debug info — which is why it was slow and
  # ran out of disk. (Coverage is unaffected: cargo-llvm-cov reads the coverage map, not DWARF.)
  SCCACHE_DIR: ${{ github.workspace }}/.sccache
  CARGO_HOME: ${{ github.workspace }}/.cargo-home
  CARGO_PROFILE_DEV_DEBUG: "0"

jobs:
  # Compute the release version ONCE (committed VERSION base + git-tag history, see
  # ci/scripts/version.sh) and hand it to every downstream job, so the embedded binary,
  # the /release/<version>/ path and the v<version> GitHub Release can never disagree.
  version:
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository_owner }}/y5-ci:fedora44
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0       # full history + tags so the patch derivation sees the series
          fetch-tags: true
      - id: compute
        run: |
          v="$(ci/scripts/version.sh)"
          echo ">> release version: $v"
          echo "version=$v" >> "$GITHUB_OUTPUT"

  # The public site: marketing root + coverage report under /docs.
  site:
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository_owner }}/y5-ci:fedora44
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ${{ env.SCCACHE_DIR }}
            ${{ env.CARGO_HOME }}/registry
          key: ${{ runner.os }}-site-${{ github.sha }}
          restore-keys: ${{ runner.os }}-site-
      # Reuse coverage from upstream-integration's CI instead of recompiling it here — that
      # instrumented build already ran on the candidate; publishing just needs the report.
      - name: Reuse coverage from the latest upstream-integration CI run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .ci-coverage
          run_id="$(gh run list --workflow=ci.yml --branch upstream-integration \
            --status success --limit 1 --json databaseId --jq '.[0].databaseId' 2>/dev/null || true)"
          if [ -n "${run_id:-}" ]; then
            echo ">> reusing coverage from ci.yml run $run_id (upstream-integration)"
            gh run download "$run_id" --name coverage-report --dir .ci-coverage \
              || echo ">> coverage-report artifact missing on run $run_id — publishing without coverage"
          else
            echo ">> no successful upstream-integration CI run found — publishing without coverage"
          fi
      # No recompile here; build-docs.sh just folds in the reused .ci-coverage/ report.
      - name: Build docs site
        run: ci/scripts/build-docs.sh
      - name: Assemble site tree (marketing at root, docs under /docs)
        run: |
          mv public _site_docs
          mkdir public
          mv _site_docs public/docs
          cp -r compositor.website/. public/
          rm -f public/SHOT_LIST.md           # internal shot list — don't publish
      - uses: actions/upload-artifact@v4
        with:
          name: site-public
          path: public

  # The install bundle (installer + binaries + components), built once here.
  bundle:
    needs: version
    runs-on: ubuntu-latest
    container: ghcr.io/${{ github.repository_owner }}/y5-ci:fedora44
    steps:
      - uses: actions/checkout@v4
      # Stamp the computed release number into the VERSION file BEFORE building, so the
      # compositor bakes it in at compile time (include_str! in the loader bin). This
      # working-tree edit is never committed — git state stays clean.
      - name: Set build version
        run: |
          echo "${{ needs.version.outputs.version }}" > VERSION
          echo ">> building compositor as $(cat VERSION)"
      - uses: actions/cache@v4
        with:
          # Same key prefix as ci.yml's installer-bundle job, so the bundle built while
          # validating upstream-integration warms this publish build too.
          path: |
            ${{ env.SCCACHE_DIR }}
            ${{ env.CARGO_HOME }}/registry
          key: ${{ runner.os }}-installer-bundle-${{ github.sha }}
          restore-keys: ${{ runner.os }}-installer-bundle-
      - name: Build install bundle (installer + binaries + components)
        run: ci/scripts/package-installer.sh
      - uses: actions/upload-artifact@v4
        with:
          name: install-bundle
          path: |
            dist/package.tar.gz
            dist/SHA256SUMS

  # Lay the bundle into the site tree under /release/... and deploy the single Pages artifact.
  deploy:
    needs: [site, bundle, version]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site-public
          path: public
      - uses: actions/download-artifact@v4
        with:
          name: install-bundle
          path: bundle
      - name: Place the install bundle at /release/<version>/ and /release/latest/
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          # Immutable per-version path plus the rolling "latest" the installer fetches —
          # identical bytes, so a pinned download and the latest download never drift.
          for slot in "$VERSION" latest; do
            mkdir -p "public/release/$slot/fedora44"
            cp bundle/package.tar.gz bundle/SHA256SUMS "public/release/$slot/fedora44/"
          done
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deploy
        uses: actions/deploy-pages@v4

  # Publish the SAME bundle as TWO GitHub Releases on every upstream push, so the Release
  # assets and the Pages /release/ downloads are always the identical artifact (no drift):
  #   v<version>  immutable, auto-numbered (patch bumped from tag history) — marked "Latest"
  #               so the README badge + GitHub's "Latest release" pointer track the real number.
  #   latest      rolling, recreated each push — the stable URL the installer/get.sh fetch.
  release:
    needs: [bundle, version]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: install-bundle
          path: dist
      - name: Publish v<version> and move the rolling "latest"
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          common="\`package.tar.gz\` is the install bundle — prebuilt compositor + components
          + the \`y5-install\` installer — the same artifact served under
          https://nourish.snowies.com/release/. Extract it and run \`y5-install/install.sh\`."

          # 1) Immutable, versioned release. The `v<version>` tag pins this commit; created
          #    once, then re-runs of the same commit just refresh the attached assets.
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo ">> release v$VERSION exists — refreshing assets"
            gh release upload "v$VERSION" dist/package.tar.gz dist/SHA256SUMS --clobber
          else
            gh release create "v$VERSION" \
              --target "$GITHUB_SHA" \
              --title "v$VERSION" \
              --latest \
              --notes "Nourish v$VERSION — built from \`upstream\` @ ${GITHUB_SHA:0:7}.

          $common" \
              dist/package.tar.gz dist/SHA256SUMS
          fi

          # 2) Rolling "latest" — recreated so its tag tracks the current commit. Marked
          #    NOT-latest so it never steals the "Latest release" pointer from v<version>.
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest \
            --target "$GITHUB_SHA" \
            --title "Latest (v$VERSION)" \
            --latest=false \
            --notes "Rolling pointer to the newest release (currently **v$VERSION**, \`upstream\`
          @ ${GITHUB_SHA:0:7}). $common" \
            dist/package.tar.gz dist/SHA256SUMS
