[package]
name = "compositor_kernel_vulkan_pipeline_hdr_base"
version = "0.0.1"
edition = "2024"

[dependencies]
ash.workspace = true
thiserror.workspace = true
compositor_kernel_vulkan_device_factory_base.workspace = true

# Ahead-of-time shader compilation (M5 HDR): the HDR composite pass is authored
# in WGSL and compiled to SPIR-V by naga (vendored via wgpu) in build.rs. No
# external glslang/glslc; not a runtime dep.
[build-dependencies]
naga = { workspace = true }

[lib]
path = "lib.rs"
