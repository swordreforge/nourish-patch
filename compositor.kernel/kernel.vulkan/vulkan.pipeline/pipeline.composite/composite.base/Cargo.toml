[package]
name = "compositor_kernel_vulkan_pipeline_composite_base"
version = "0.0.1"
edition = "2024"

[dependencies]
compositor_developer_debug_instance_record.workspace = true
bitflags.workspace = true
smithay.workspace = true
ash.workspace = true
thiserror.workspace = true

# Compositor dependencies (CI ensures availability in workspace)
compositor_kernel_vulkan_device_factory_base.workspace = true

# The Y5_AA experiment pipeline (`aa.wgsl`) is naga-compiled to SPIR-V at build
# time (like pipeline.hdr); the plain GLSL composite `.spv` stay checked in.
[build-dependencies]
naga = { workspace = true }

[lib]
path = "lib.rs"
