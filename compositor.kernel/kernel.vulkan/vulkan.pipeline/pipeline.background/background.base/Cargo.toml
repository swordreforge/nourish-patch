[package]
name = "compositor_kernel_vulkan_pipeline_background_base"
version = "0.0.1"
edition = "2024"

[dependencies]
ash.workspace = true
compositor_kernel_vulkan_device_factory_base.workspace = true
compositor_kernel_vulkan_renderer_error_base.workspace = true

# The HDR parallax variant (`parallax_hdr.wgsl`) is naga-compiled at build time,
# like the HDR composite. The SDR parallax ships committed SPIR-V (no compile).
[build-dependencies]
naga = { workspace = true }

[lib]
path = "lib.rs"
