[package]
name = "compositor_kernel_vulkan_renderer_core_base"
version = "0.0.1"
edition = "2024"

[dependencies]
compositor_developer_debug_instance_record.workspace = true
compositor_developer_environment_config_base.workspace = true
compositor_developer_environment_graphics_base.workspace = true
smithay.workspace = true
ash.workspace = true

# The vulkan piece-crates this renderer assembles.
compositor_kernel_vulkan_renderer_error_base.workspace = true
compositor_kernel_vulkan_texture_image_base.workspace = true
compositor_kernel_vulkan_texture_cache_base.workspace = true
compositor_kernel_vulkan_memory_target_base.workspace = true
compositor_kernel_vulkan_memory_upload_base.workspace = true
compositor_kernel_vulkan_capture_blit_base.workspace = true
compositor_kernel_vulkan_device_factory_base.workspace = true
compositor_kernel_vulkan_device_queue_base.workspace = true
compositor_kernel_vulkan_instance_factory_base.workspace = true
compositor_kernel_vulkan_instance_physical_base.workspace = true
compositor_kernel_vulkan_memory_export_base.workspace = true
compositor_kernel_vulkan_sync_export_base.workspace = true
compositor_kernel_vulkan_sync_fence_base.workspace = true
compositor_kernel_vulkan_format_query_base.workspace = true
compositor_kernel_vulkan_format_modifier_base.workspace = true
compositor_kernel_vulkan_memory_import_base.workspace = true
compositor_kernel_vulkan_pipeline_cache_base.workspace = true
compositor_kernel_vulkan_pipeline_composite_base.workspace = true
compositor_kernel_vulkan_pipeline_fullscreen_base.workspace = true
compositor_kernel_vulkan_pipeline_hdr_base.workspace = true
compositor_kernel_vulkan_command_pool_base.workspace = true
compositor_kernel_vulkan_command_record_base.workspace = true
compositor_kernel_vulkan_element_texture_base.workspace = true
compositor_kernel_vulkan_element_solid_base.workspace = true

# The scene-dispatch seam (compositor.kernel/kernel.graphic): VulkanFrame implements it as a
# blank draw for the GLES-resource elements until their vulkan-native paths land.
compositor_orchestration_draw_dispatch_frame.workspace = true

# Diagnostics registry (developer tool Statistics tab). Direct cross-workspace
# path dep (minimal blast radius — std-only crate, no cycle); not in the
# generated link block.
compositor_developer_stats_registry_base = { workspace = true }
# Per-surface HDR color tag (shared with the color-management protocol). Leaf
# type crate; direct path dep (minimal blast, no support-layer coupling).
compositor_kernel_graphic_color_surface_base = { workspace = true }
# Pipeline cache persistence: state_dir() for cache file location.
compositor_support_system_persist_path_base = { workspace = true }

[lib]
path = "lib.rs"
