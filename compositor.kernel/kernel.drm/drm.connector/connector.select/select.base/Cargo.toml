[package]
name = "compositor_kernel_drm_connector_select_base"
version = "0.0.1"
edition = "2024"

[dependencies]
compositor_developer_debug_instance_record.workspace = true
bitflags.workspace = true
smithay.workspace = true

# Compositor dependencies (CI ensures availability in workspace)
compositor_kernel_graphic_preference_output_profile.workspace = true
# EDID read + identity so a profile's "make model serial" can be matched against
# the connected monitors (preference-driven default-output selection).
compositor_kernel_drm_edid_parse_base.workspace = true
compositor_kernel_drm_edid_identity_base.workspace = true

[lib]
path = "lib.rs"
