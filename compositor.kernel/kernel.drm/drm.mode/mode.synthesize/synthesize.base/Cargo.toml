[package]
name = "compositor_kernel_drm_mode_synthesize_base"
version = "0.0.1"
edition = "2024"

[dependencies]
compositor_developer_debug_instance_record.workspace = true
bitflags.workspace = true
smithay.workspace = true
drm-ffi = { workspace = true, optional = true }

[features]
# Law-7 double gate, compile-time half (the runtime half is
# SafetyEnable::mode_synthesize, asserted at the assembly site).
mode-synthesize = ["dep:drm-ffi"]

[lib]
path = "lib.rs"
