[package]
name = "compositor_kernel_loader_main_execute_base"
version = "0.0.1"
edition = "2024"
description = "y5 — a Wayland compositor with an infinite, zoomable canvas (the y5_compositor binary). Publicly branded Nourish."
license = "MIT OR Apache-2.0"
repository = "https://github.com/y5-snowies/nourish"
homepage = "https://nourish.snowies.com"
readme = "../../../../../README.md"


[dependencies]
uuid = { workspace = true }
compositor_support_system_trait_system_base = { workspace = true }
compositor_background_three_system_prewarm = { workspace = true }
compositor_orchestration_driver_capture_base = { workspace = true }
compositor_y5_graphic_capture_registry = { workspace = true }
compositor_orchestration_driver_introspection_base = { workspace = true }
compositor_support_world_kind_build_base = { workspace = true }
compositor_support_smithay_state_space_base = { workspace = true }
compositor_support_world_host_space_base = { workspace = true }
compositor_y5_select_system_base = { workspace = true }
compositor_y5_group_system_base = { workspace = true }
compositor_y5_launcher_system_base = { workspace = true }
compositor_y5_placeholder_system_base = { workspace = true }
compositor_orchestration_seat_system_pointer = { workspace = true }
compositor_y5_canvas_system_base = { workspace = true }
compositor_y5_window_system_base = { workspace = true }
compositor_y5_camera_system_base = { workspace = true }
compositor_y5_navigator_system_base = { workspace = true }
compositor_orchestration_world_manager_base = { workspace = true }
compositor_support_system_world_host_base = { workspace = true }
compositor_support_system_persist_engine_base = { workspace = true }
compositor_support_system_storage_slot_base = { workspace = true }
compositor_orchestration_smithay_data_base = { workspace = true }
compositor_y5_lock_system_base = { workspace = true }
compositor_y5_picker_system_base = { workspace = true }
compositor_y5_surface_system_base = { workspace = true }
compositor_y5_group_interface_base = { workspace = true }
compositor_y5_select_interface_base = { workspace = true }
compositor_background_two_system_base = { workspace = true }
compositor_background_three_system_base = { workspace = true }
compositor_orchestration_environment_interface_lifecycle.workspace = true
compositor_orchestration_environment_type_base.workspace = true
# Diagnostics registry (developer Statistics tab) — direct cross-workspace path dep.
compositor_developer_stats_registry_base = { workspace = true }
compositor_support_bevy_core_runtime_base.workspace = true
bitflags = { workspace = true }
smithay = { workspace = true }
compositor_kernel_native_wire_entry_base = { workspace = true, optional = true }
compositor_kernel_winit_wire_entry_base = { workspace = true, optional = true }
compositor_kernel_vulkan_renderer_core_base = { workspace = true, optional = true }
compositor_orchestration_draw_state_lifecycle.workspace = true
compositor_orchestration_core_state_base.workspace = true
compositor_support_smithay_dispatch_state_base.workspace = true
compositor_support_smithay_wayland_connection_record.workspace = true
compositor_support_library_debug_client_base.workspace = true
compositor_remote_transport_server_base.workspace = true
compositor_monitor_runtime_surface_base.workspace = true
compositor_introspection_sampler_window_base.workspace = true
compositor_introspection_extraction_window_base.workspace = true
# Developer structured logging (separate compositor.developer workspace). Direct path deps
# keep the wiring local — no edits to this workspace's link.json/GENERATED block.
compositor_developer_log_process_main = { workspace = true }
compositor_developer_debug_instance_record = { workspace = true }
# Central environment config — read once at the very top of main() (before logging).
compositor_developer_environment_config_base = { workspace = true }
compositor_y5_picker_world_restore = { workspace = true }
# App-launch executor wiring (kernel.execution driver) — main() calls
# block_sigchld() + install() and nothing else from the launch subsystem.
compositor_kernel_execution_driver_executor_install = { workspace = true }

[[bin]]
name = "y5_compositor"
path = "main.rs"

[features]
default = ["backend-winit"]
backend-native = ["dep:compositor_kernel_native_wire_entry_base"]
backend-winit = ["dep:compositor_kernel_winit_wire_entry_base"]

# Renderer + Law-7 safety-net gates, forwarded to the native backend (no-op in
# a winit-only build via the optional-dep `?` syntax).
# Run the VulkanRenderer hardware self-test at startup (works under any backend,
# incl. winit — it builds its own VkInstance and renders to an exported dmabuf).
vulkan-validate = ["dep:compositor_kernel_vulkan_renderer_core_base"]
renderer-vulkan = ["compositor_kernel_native_wire_entry_base?/renderer-vulkan"]
native-scanout = ["compositor_kernel_native_wire_entry_base?/native-scanout"]
mode-synthesize = ["compositor_kernel_native_wire_entry_base?/mode-synthesize"]
modifier-fallback = ["compositor_kernel_native_wire_entry_base?/modifier-fallback"]
timing-throttle = ["compositor_kernel_native_wire_entry_base?/timing-throttle"]
timing-predict = ["compositor_kernel_native_wire_entry_base?/timing-predict"]
flip-estimate = ["compositor_kernel_native_wire_entry_base?/flip-estimate"]
