[package]
name = "compositor_kernel_execution_driver_executor_install"
version = "0.0.1"
edition = "2024"

[dependencies]
libc = { workspace = true }
smithay = { workspace = true }
compositor_kernel_execution_driver_executor_base = { workspace = true }
compositor_introspection_execution_launch_policy = { workspace = true }
compositor_introspection_execution_launch_reap = { workspace = true }
compositor_introspection_execution_launch_dispatch = { workspace = true }
compositor_introspection_execution_launch_types = { workspace = true }
compositor_orchestration_core_state_base = { workspace = true }
compositor_orchestration_launch_broadcast_base = { workspace = true }
compositor_orchestration_environment_type_base = { workspace = true }
compositor_developer_debug_instance_record = { workspace = true }

[package.metadata.lint]
allow = ["size"]
reason = "One cohesive startup-wiring unit: block_sigchld + install + base_env + the signalfd reaper source share the SIGCHLD-blocked precondition and the single calloop LoopHandle, so they stay together rather than fragmenting the loader wiring."

[lib]
path = "lib.rs"
