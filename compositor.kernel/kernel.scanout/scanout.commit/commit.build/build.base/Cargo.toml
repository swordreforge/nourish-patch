[package]
name = "compositor_kernel_scanout_commit_build_base"
version = "0.0.1"
edition = "2024"
# The crate's module file is `build.rs` (chain-prefix L2 tail = "build").
# Disable Cargo's automatic build-script detection so `build.rs` is treated as
# the `pub mod build;` source, not a build script.
build = false

[dependencies]
compositor_developer_debug_instance_record.workspace = true
bitflags.workspace = true
smithay.workspace = true

[features]
native-scanout = []

[lib]
path = "lib.rs"
