[package]
name = "compositor_kernel_native_context_display_build"
version = "0.0.1"
edition = "2024"
# `build.rs` here is the crate's MODULE (see lib.rs `pub mod build;`), not a Cargo
# build script — disable build-script auto-detection so Cargo doesn't try to
# compile it as one.
build = false

[dependencies]
smithay = { workspace = true }
compositor_kernel_scanout_surface_output_base = { workspace = true }
compositor_kernel_scanout_pipe_claim_free = { workspace = true }
compositor_kernel_scanout_commit_test_base = { workspace = true }
compositor_kernel_drm_connector_scan_base = { workspace = true }
compositor_kernel_drm_mode_select_base = { workspace = true }
compositor_kernel_drm_edid_parse_base = { workspace = true }
compositor_kernel_gles_element_wrap_base = { workspace = true }
compositor_orchestration_draw_scene_element = { workspace = true }
compositor_orchestration_core_state_base = { workspace = true }
compositor_orchestration_driver_output_base = { workspace = true }
# Developer logging — provides error!/warn!/info!/trace!/abort! (see lib.rs).
compositor_developer_debug_instance_record = { workspace = true }

[lib]
path = "lib.rs"
