[package]
name = "compositor_kernel_native_assemble_renderer_base"
version = "0.0.1"
edition = "2024"

[dependencies]
compositor_developer_debug_instance_record.workspace = true
compositor_developer_environment_config_base.workspace = true
bitflags.workspace = true
smithay.workspace = true

# Compositor dependencies (CI ensures availability in workspace)
compositor_kernel_drm_gbm_alloc_base.workspace = true
compositor_kernel_gles_element_wrap_base.workspace = true
compositor_kernel_gles_multigpu_bind_base.workspace = true
compositor_kernel_gles_multigpu_factory_base.workspace = true
compositor_kernel_native_assemble_display_base.workspace = true
compositor_kernel_scanout_commit_test_base.workspace = true
compositor_kernel_scanout_surface_output_base.workspace = true
compositor_kernel_graphic_render_contract_base.workspace = true
compositor_kernel_graphic_preference_enable_safety = { workspace = true, optional = true }
compositor_kernel_graphic_preference_renderer_rank.workspace = true
compositor_orchestration_draw_scene_element.workspace = true
compositor_orchestration_core_state_base.workspace = true

# Diagnostics registry (developer Statistics tab) — direct cross-workspace path dep.
compositor_developer_stats_registry_base = { workspace = true }

compositor_kernel_vulkan_instance_factory_base = { workspace = true, optional = true }
compositor_kernel_vulkan_instance_physical_base = { workspace = true, optional = true }
compositor_kernel_vulkan_device_factory_base = { workspace = true, optional = true }
compositor_kernel_vulkan_device_queue_base = { workspace = true, optional = true }
compositor_kernel_vulkan_memory_alloc_base = { workspace = true, optional = true }
compositor_kernel_vulkan_memory_export_base = { workspace = true, optional = true }
compositor_kernel_vulkan_memory_import_base = { workspace = true, optional = true }
compositor_kernel_vulkan_format_modifier_base = { workspace = true, optional = true }
compositor_kernel_vulkan_pipeline_cache_base = { workspace = true, optional = true }
compositor_kernel_vulkan_pipeline_composite_base = { workspace = true, optional = true }
compositor_kernel_vulkan_command_pool_base = { workspace = true, optional = true }
compositor_kernel_vulkan_command_record_base = { workspace = true, optional = true }
compositor_kernel_vulkan_element_solid_base = { workspace = true, optional = true }
compositor_kernel_vulkan_element_texture_base = { workspace = true, optional = true }
compositor_kernel_vulkan_sync_timeline_base = { workspace = true, optional = true }
compositor_kernel_vulkan_sync_export_base = { workspace = true, optional = true }
compositor_kernel_vulkan_sync_import_base = { workspace = true, optional = true }
compositor_kernel_drm_syncobj_timeline_base = { workspace = true, optional = true }
compositor_kernel_drm_syncobj_device_base = { workspace = true, optional = true }
ash = { workspace = true, optional = true }
compositor_kernel_scanout_framebuffer_modifier_base = { workspace = true, optional = true }
compositor_kernel_scanout_swapchain_slot_base = { workspace = true, optional = true }
compositor_kernel_scanout_swapchain_acquire_base = { workspace = true, optional = true }
compositor_kernel_scanout_framebuffer_import_base = { workspace = true, optional = true }
compositor_kernel_scanout_framebuffer_export_base = { workspace = true, optional = true }
compositor_kernel_scanout_commit_build_base = { workspace = true, optional = true }
compositor_kernel_scanout_commit_submit_base = { workspace = true, optional = true }
compositor_kernel_scanout_fence_in_base = { workspace = true, optional = true }
compositor_kernel_scanout_fence_out_base = { workspace = true, optional = true }
compositor_kernel_drm_connector_scan_base = { workspace = true, optional = true }
[features]
# The reinstated de-delegation machine: compiled in and kernel-validated by
# the assembly self-test (TEST_ONLY); the hosted manager stays the live
# presentation path until the swap-over.
native-scanout = [
    "dep:compositor_kernel_scanout_swapchain_slot_base",
    "compositor_kernel_scanout_swapchain_slot_base/native-scanout",
    "dep:compositor_kernel_scanout_swapchain_acquire_base",
    "compositor_kernel_scanout_swapchain_acquire_base/native-scanout",
    "dep:compositor_kernel_scanout_framebuffer_import_base",
    "compositor_kernel_scanout_framebuffer_import_base/native-scanout",
    "dep:compositor_kernel_scanout_framebuffer_export_base",
    "compositor_kernel_scanout_framebuffer_export_base/native-scanout",
    "dep:compositor_kernel_scanout_commit_build_base",
    "compositor_kernel_scanout_commit_build_base/native-scanout",
    "dep:compositor_kernel_scanout_commit_submit_base",
    "compositor_kernel_scanout_commit_submit_base/native-scanout",
    "dep:compositor_kernel_scanout_fence_in_base",
    "compositor_kernel_scanout_fence_in_base/native-scanout",
    "dep:compositor_kernel_scanout_fence_out_base",
    "compositor_kernel_scanout_fence_out_base/native-scanout",
    "dep:compositor_kernel_drm_syncobj_device_base",
    "dep:compositor_kernel_drm_connector_scan_base",
]
modifier-fallback = [
    "dep:compositor_kernel_scanout_framebuffer_modifier_base",
    "compositor_kernel_scanout_framebuffer_modifier_base/modifier-fallback",
    "dep:compositor_kernel_graphic_preference_enable_safety",
]
# The vulkan arm: foundation self-test of the full vulkan stack. No fallback:
# selecting vulkan without this feature panics at assembly.
renderer-vulkan = [
    "dep:compositor_kernel_vulkan_instance_factory_base",
    "dep:compositor_kernel_vulkan_instance_physical_base",
    "dep:compositor_kernel_vulkan_device_factory_base",
    "dep:compositor_kernel_vulkan_device_queue_base",
    "dep:compositor_kernel_vulkan_memory_alloc_base",
    "dep:compositor_kernel_vulkan_memory_export_base",
    "dep:compositor_kernel_vulkan_memory_import_base",
    "dep:compositor_kernel_vulkan_format_modifier_base",
    "dep:compositor_kernel_vulkan_pipeline_cache_base",
    "dep:compositor_kernel_vulkan_pipeline_composite_base",
    "dep:compositor_kernel_vulkan_command_pool_base",
    "dep:compositor_kernel_vulkan_command_record_base",
    "dep:compositor_kernel_vulkan_element_solid_base",
    "dep:compositor_kernel_vulkan_element_texture_base",
    "dep:compositor_kernel_vulkan_sync_timeline_base",
    "dep:compositor_kernel_vulkan_sync_export_base",
    "dep:compositor_kernel_vulkan_sync_import_base",
    "dep:compositor_kernel_drm_syncobj_timeline_base",
    "dep:compositor_kernel_drm_syncobj_device_base",
    "dep:ash",
]

[lib]
path = "lib.rs"
