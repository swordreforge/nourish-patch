[package]
name = "compositor_kernel_native_assemble_display_base"
version = "0.0.1"
edition = "2024"

[dependencies]
compositor_developer_debug_instance_record.workspace = true
bitflags.workspace = true
smithay.workspace = true

# Compositor dependencies (CI ensures availability in workspace)
compositor_kernel_drm_connector_kind_base.workspace = true
compositor_kernel_drm_connector_diff_base.workspace = true
compositor_kernel_drm_connector_scan_base.workspace = true
compositor_kernel_drm_connector_select_base.workspace = true
compositor_kernel_drm_device_node_base.workspace = true
compositor_kernel_drm_device_open_base.workspace = true
compositor_kernel_drm_edid_identity_base.workspace = true
compositor_kernel_drm_edid_parse_base.workspace = true
compositor_kernel_drm_gbm_device_base.workspace = true
compositor_kernel_drm_mode_enumerate_base.workspace = true
compositor_kernel_drm_mode_select_base.workspace = true
compositor_kernel_drm_output_physical_base.workspace = true
compositor_kernel_gpu_topology_role_base.workspace = true
compositor_kernel_gpu_topology_route_base.workspace = true
compositor_kernel_native_device_select_base.workspace = true
compositor_kernel_scanout_commit_test_base.workspace = true
compositor_kernel_scanout_pipe_assign_base.workspace = true
compositor_kernel_scanout_pipe_claim_base.workspace = true
compositor_kernel_seat_interface_open_base.workspace = true
compositor_kernel_seat_session_factory_base.workspace = true
compositor_kernel_udev_enumerate_gpu_base.workspace = true
compositor_kernel_udev_enumerate_scan_base.workspace = true
compositor_kernel_graphic_preference_gpu_rank.workspace = true
compositor_kernel_graphic_preference_layout_output.workspace = true
compositor_kernel_graphic_preference_output_profile.workspace = true

compositor_kernel_drm_mode_synthesize_base = { workspace = true, optional = true }
compositor_kernel_graphic_preference_enable_safety = { workspace = true, optional = true }
[features]
mode-synthesize = [
    "dep:compositor_kernel_drm_mode_synthesize_base",
    "compositor_kernel_drm_mode_synthesize_base/mode-synthesize",
    "dep:compositor_kernel_graphic_preference_enable_safety",
]

[lib]
path = "lib.rs"
