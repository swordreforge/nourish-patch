[package]
name = "compositor_kernel_native_wire_frame_base"
version = "0.0.1"
edition = "2024"

[dependencies]
compositor_orchestration_driver_resume_base = { workspace = true }
compositor_developer_debug_instance_record.workspace = true
bitflags.workspace = true
smithay.workspace = true

# Compositor dependencies (CI ensures availability in workspace)
compositor_kernel_drm_loop_notifier_base.workspace = true
compositor_kernel_native_context_render_base.workspace = true
compositor_kernel_native_render_execute_base.workspace = true
compositor_kernel_scanout_flip_feedback_base.workspace = true
compositor_kernel_scanout_timing_vblank_base.workspace = true
compositor_kernel_graphic_draw_present_callbacks.workspace = true
compositor_orchestration_core_state_base.workspace = true

compositor_kernel_scanout_timing_throttle_base = { workspace = true, optional = true }
compositor_kernel_scanout_timing_predict_base = { workspace = true, optional = true }
compositor_kernel_scanout_flip_estimate_base = { workspace = true, optional = true }
[features]
timing-throttle = [
    "dep:compositor_kernel_scanout_timing_throttle_base",
    "compositor_kernel_scanout_timing_throttle_base/timing-throttle",
]
flip-estimate = [
    "dep:compositor_kernel_scanout_flip_estimate_base",
    "compositor_kernel_scanout_flip_estimate_base/flip-estimate",
    "compositor_kernel_native_render_execute_base/flip-estimate",
]
# Prediction refines the estimate delay — it implies the estimate net.
timing-predict = [
    "flip-estimate",
    "dep:compositor_kernel_scanout_timing_predict_base",
    "compositor_kernel_scanout_timing_predict_base/timing-predict",
]

[lib]
path = "lib.rs"
