[package]
name = "compositor_kernel_native_wire_entry_base"
version = "0.0.1"
edition = "2024"

[dependencies]
compositor_orchestration_driver_output_base.workspace = true
compositor_kernel_vulkan_renderer_core_base.workspace = true
compositor_developer_debug_instance_record.workspace = true
compositor_developer_environment_config_base.workspace = true
compositor_developer_stats_registry_base = { workspace = true }
bitflags.workspace = true
smithay.workspace = true

# Compositor dependencies (CI ensures availability in workspace)
compositor_kernel_drm_connector_kind_base.workspace = true
compositor_kernel_drm_syncobj_device_base.workspace = true
compositor_kernel_gpu_registry_node_base.workspace = true
compositor_kernel_input_libinput_factory_base.workspace = true
compositor_kernel_input_loop_libinput_base.workspace = true
compositor_kernel_native_assemble_display_base.workspace = true
compositor_kernel_native_assemble_renderer_base.workspace = true
compositor_kernel_native_context_display_apply.workspace = true
compositor_kernel_native_context_display_base.workspace = true
compositor_kernel_native_context_display_enumerate.workspace = true
compositor_kernel_native_context_display_mode.workspace = true
compositor_kernel_native_context_render_base.workspace = true
compositor_kernel_native_context_topology_base.workspace = true
compositor_kernel_native_render_execute_base.workspace = true
compositor_kernel_native_wire_frame_base.workspace = true
compositor_kernel_native_context_display_reconcile = { workspace = true }
compositor_kernel_native_wire_input_base.workspace = true
compositor_kernel_native_wire_plugin_base.workspace = true
compositor_kernel_native_wire_session_base.workspace = true
compositor_y5_lock_interface_base.workspace = true
compositor_kernel_udev_loop_watch_base.workspace = true
compositor_kernel_graphic_draw_plan_tap.workspace = true
compositor_kernel_graphic_preference_enable_safety.workspace = true
compositor_kernel_graphic_preference_renderer_rank.workspace = true
compositor_orchestration_core_state_base.workspace = true
compositor_orchestration_driver_lid_base.workspace = true
compositor_orchestration_driver_logind_base.workspace = true
compositor_orchestration_draw_state_lifecycle.workspace = true
compositor_support_smithay_state_dmabuf_dispatch.workspace = true
compositor_support_smithay_dispatch_state_base.workspace = true

[features]
renderer-vulkan = [
    "compositor_kernel_native_assemble_renderer_base/renderer-vulkan",
]
mode-synthesize = [
    "compositor_kernel_native_assemble_display_base/mode-synthesize",
]
native-scanout = [
    "compositor_kernel_native_assemble_renderer_base/native-scanout",
]
modifier-fallback = [
    "compositor_kernel_native_assemble_renderer_base/modifier-fallback",
]
timing-throttle = ["compositor_kernel_native_wire_frame_base/timing-throttle"]
timing-predict = ["compositor_kernel_native_wire_frame_base/timing-predict"]
flip-estimate = ["compositor_kernel_native_wire_frame_base/flip-estimate"]

[lib]
path = "lib.rs"
